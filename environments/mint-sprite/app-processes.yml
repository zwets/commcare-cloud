formplayer_memory: "1024m"

management_commands:
  sprite:
    run_submission_reprocessing_queue:
    queue_schedule_instances:
    handle_survey_actions:
    run_sms_queue:
    run_pillow_retry_queue:

beat_processes:
  monolith:
    # 0. The main time keeper
    beat: {}

celery_processes:
  sprite:

    # 1. Main Worker: Fast, critical tasks. Needs higher concurrency.
    main_worker:
      queues:
        - celery
        - submission_reprocessing_queue
        - background_queue
        - async_restore_queue
        - linked_domain_queue
      concurrency: 4
      prefetch_multiplier: 1
      max_tasks_per_child: 50

    # 2. Data Worker: Heavy RAM/IO tasks. Low concurrency to protect your 20GB RAM.
    data_worker:
      queues:
        - case_import_queue
        - user_import_queue
        - export_download_queue
        - saved_exports_queue
        - ucr_queue
        - ucr_indicator_queue
        - analytics_queue
        - dashboard_comparison_queue  # From your original query
      concurrency: 2
      prefetch_multiplier: 1
      max_tasks_per_child: 10  # Restart more often due to heavy memory usage

    # 3. Messaging/Rules Worker: Periodic and automated tasks.
    messaging_worker:
      queues:
        - sms_queue
        - email_queue
        - reminder_queue
        - reminder_rule_queue
        - reminder_case_update_queue
        - reminder_case_update_bulk_queue
        - repeat_record_queue
        - repeat_record_datasource_queue
      concurrency: 2
      prefetch_multiplier: 1  # Could go up a bit if stable
      max_tasks_per_child: 50

    # 4. Background/Misc Worker: Catch-all for less frequent background tasks.
    background_worker:
      queues:
        - case_rule_queue
        - geospatial_queue
        - logistics_background_queue
        - logistics_reminder_queue
        - malt_generation_queue
        - ush_background_tasks
        - send_report_throttled
      concurrency: 2
      prefetch_multiplier: 1
      max_tasks_per_child: 10  # Restart more often as less frequent

    # 5. Periodic Worker: Executes the scheduled "Beat" tasks.
    periodic_worker:
      queues:
        - celery_periodic
      concurrency: 1  # 1 is usually enough for a monolith
      prefetch_multiplier: 1
      max_tasks_per_child: 50

  None:
    # Unused queues
    flower: {}
    icds_aggregation_queue:
    icds_dashboard_reports_queue:
    sumologic_logs_queue:

