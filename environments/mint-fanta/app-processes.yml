formplayer_memory: "1024m"

management_commands:
  fanta:
    run_submission_reprocessing_queue:
    queue_schedule_instances:
    handle_survey_actions:
    run_sms_queue:
    run_pillow_retry_queue:

celery_processes:
  fanta:

    # 0. The main time keeper (should be in top-level beat_processes)
    beat: {}

    # 1. Main Worker: Fast, critical tasks. Needs higher concurrency.
    celery,submission_reprocessing_queue,background_queue,async_restore_queue,linked_domain_queue:
      concurrency: 4
      prefetch_multiplier: 1
      max_tasks_per_child: 50

    # 2. Data Worker: Heavy RAM/IO tasks. Low concurrency to protect your 20GB RAM.
    case_import_queue,user_import_queue,export_download_queue,saved_exports_queue,ucr_queue,ucr_indicator_queue,analytics_queue,dashboard_comparison_queue:
      concurrency: 2
      prefetch_multiplier: 1
      max_tasks_per_child: 10  # Restart more often due to heavy memory usage

    # 3. Messaging/Rules Worker: Periodic and automated tasks.
    sms_queue,email_queue,reminder_queue,reminder_rule_queue,reminder_case_update_queue,reminder_case_update_bulk_queue,repeat_record_queue,repeat_record_datasource_queue:
      concurrency: 2
      prefetch_multiplier: 1  # Could go up a bit if stable
      max_tasks_per_child: 50

    # 4. Background/Misc Worker: Catch-all for less frequent background tasks.
    case_rule_queue,geospatial_queue,logistics_background_queue,logistics_reminder_queue,malt_generation_queue,ush_background_tasks,send_report_throttled:
      concurrency: 2
      prefetch_multiplier: 1
      max_tasks_per_child: 10  # Restart more often as less frequent

    # 5. Periodic Worker: Executes the scheduled "Beat" tasks.
    celery_periodic:
      concurrency: 1  # 1 is usually enough for a monolith
      prefetch_multiplier: 1
      max_tasks_per_child: 50

  None:
    flower: {}
    icds_aggregation_queue:
    icds_dashboard_reports_queue:
    sumologic_logs_queue:

pillows:
  fanta:
    AppDbChangeFeedPillow:
      num_processes: 1
    ApplicationToElasticsearchPillow:
      num_processes: 1
    CacheInvalidatePillow:
      num_processes: 1
    DomainDbKafkaPillow:
      num_processes: 1
    KafkaDomainPillow:
      num_processes: 1
# Zwets remove unused pillows (each saves 350M memory)
#    LedgerToElasticsearchPillow:
#      num_processes: 1
    SqlSMSPillow:
      num_processes: 1
    UpdateUserSyncHistoryPillow:
      num_processes: 1
    UserCacheInvalidatePillow:
      num_processes: 1
    UserGroupsDbKafkaPillow:
      num_processes: 1
    case-pillow:
      num_processes: 2
      dedicated_migration_process: True
    xform-pillow:
      num_processes: 2
      dedicated_migration_process: True
    user-pillow:
      num_processes: 1
    group-pillow:
      num_processes: 1

